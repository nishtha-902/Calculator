<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CALCULATOR</h1>
    <div class="cal">
        <input id="input1" type="text"></input>
        <div class="row1">
            <button class="btn" id="ac">AC</button>
            <button class="btn" id="del">DEL</button>
            <button class="btn" id="mod">%</button>
            <button class="btn" id="floor">/</button>
        </div>
        <div class="row1">
            <button class="btn" id="no7">7</button>
            <button class="btn" id="no8">8</button>
            <button class="btn" id="no9">9</button>
            <button class="btn" id="div">÷</button>
        </div>
        <div class="row1">
            <button class="btn" id="no4">4</button>
            <button class="btn" id="no5">5</button>
            <button class="btn" id="no6">6</button>
            <button class="btn" id="mul">x</button>
        </div>
        <div class="row1">
            <button class="btn" id="no1">1</button>
            <button class="btn" id="no2">2</button>
            <button class="btn" id="no3">3</button>
            <button class="btn" id="min">-</button>
        </div>
        <div class="row1">
            <button class="btn" id="no0">0</button>
            <button class="btn" id="dot">.</button>
            <button class="btn" id="plus">+</button>
            <button class="btn" id="eq">=</button>
        </div>
    </div>
    <script src="script.js">
    </script>
</body>
</html>
